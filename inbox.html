<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    :root{--green:#0b7a6d;--green2:#12a48f;--soft:#e9f7f3;--out:#d9fdd3;--ink:#172b36;--muted:#667781;--line:#e3e9e7;--bg:#efeae2;--danger:#d92d20;--blue:#53bdeb;--shadow:0 12px 35px rgba(16,47,42,.12)}
    *{box-sizing:border-box} html,body{width:100%;height:100%;overflow:hidden} body{margin:0;position:fixed;inset:0;font-family:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;color:var(--ink);background:#d9e5e1} button,input,textarea{font:inherit}
    .app{height:100vh;height:100dvh;min-height:0;overflow:hidden;display:grid;grid-template-columns:390px 1fr;max-width:1600px;margin:auto;background:#fff;box-shadow:var(--shadow)}
    .sidebar{min-width:0;min-height:0;overflow:hidden;display:flex;flex-direction:column;border-right:1px solid var(--line);background:#fff}.side-head{padding:16px;border-bottom:1px solid var(--line);background:#f8fbfa}.brand-row{display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{display:flex;align-items:center;gap:11px}.logo{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;background:#dff5ef;font-size:23px}.brand h1{margin:0;font-size:19px}.brand small{color:var(--muted)}
    .head-actions{display:flex;gap:7px}.icon-btn{width:38px;height:38px;border:1px solid var(--line);border-radius:11px;background:#fff;cursor:pointer;display:grid;place-items:center}.icon-btn:hover{background:var(--soft)}
    .search-wrap{margin-top:13px;display:flex;gap:8px}.search{flex:1;border:1px solid var(--line);border-radius:12px;padding:11px 13px;outline:none;background:#fff}.search:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(11,122,109,.1)}
    .filters{display:flex;gap:7px;margin-top:10px}.filter{border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 11px;font-size:12px;cursor:pointer}.filter.active{background:var(--green);color:white;border-color:var(--green)}
    .conversation-list{overflow:auto;flex:1;min-height:0;overscroll-behavior:contain}.conversation-item{width:100%;border:0;border-bottom:1px solid #eff3f2;background:#fff;padding:13px 14px;display:grid;grid-template-columns:50px minmax(0,1fr) auto;gap:11px;text-align:left;cursor:pointer;position:relative}.conversation-item:hover,.conversation-item.active{background:#f0f8f6}.conversation-item.unread .name{font-weight:850}.avatar{width:50px;height:50px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(145deg,#d9eee8,#c7e4dc);color:#086d61;font-weight:850}.conv-main{min-width:0}.conv-top{display:flex;justify-content:space-between;gap:10px}.name{font-weight:680;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.time{font-size:11px;color:var(--muted);white-space:nowrap}.conversation-item.unread .time{color:var(--green);font-weight:750}.preview{margin-top:5px;color:var(--muted);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.conv-foot{display:flex;gap:6px;align-items:center;margin-top:6px}.rating{font-size:11px;background:#fff4cd;color:#815f00;border-radius:999px;padding:3px 7px}.unread-badge{min-width:21px;height:21px;border-radius:999px;background:#22c58b;color:white;display:grid;place-items:center;font-size:11px;font-weight:800;align-self:center}.menu-btn{border:0;background:transparent;color:var(--muted);font-size:20px;cursor:pointer;padding:0 3px;opacity:.2}.conversation-item:hover .menu-btn{opacity:1}
    .chat{min-width:0;min-height:0;overflow:hidden;display:flex;flex-direction:column;background:var(--bg);background-image:radial-gradient(rgba(11,122,109,.04) 1px,transparent 1px);background-size:22px 22px}.chat-header{height:72px;flex:0 0 72px;position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:12px;padding:11px 18px;background:#f8fbfa;border-bottom:1px solid var(--line)}.chat-header h2{margin:0;font-size:17px}.chat-header p{margin:3px 0 0;color:var(--muted);font-size:12px}.header-spacer{flex:1}.connection{font-size:11px;color:#18875f;background:#e4f7ef;padding:6px 9px;border-radius:999px}
    .messages{flex:1;min-height:0;overflow:auto;overscroll-behavior:contain;padding:24px clamp(16px,7vw,100px);scroll-behavior:smooth}.date-separator{text-align:center;margin:18px 0}.date-separator span{display:inline-block;background:#fff;padding:6px 10px;border-radius:8px;font-size:11px;color:#617078;box-shadow:0 1px 2px rgba(0,0,0,.08)}.unread-line{display:flex;align-items:center;gap:10px;margin:17px 0;color:var(--green);font-size:12px;font-weight:750}.unread-line:before,.unread-line:after{content:"";height:1px;background:#9ddacb;flex:1}
    .message-row{display:flex;margin:3px 0}.message-row.outgoing{justify-content:flex-end}.bubble{position:relative;max-width:min(680px,78%);padding:8px 10px 6px;border-radius:9px;background:#fff;box-shadow:0 1px 1.5px rgba(0,0,0,.13);white-space:pre-wrap;overflow-wrap:anywhere;line-height:1.42;font-size:14px}.incoming .bubble{border-top-left-radius:2px}.outgoing .bubble{background:var(--out);border-top-right-radius:2px}.message-meta{display:flex;align-items:center;justify-content:flex-end;gap:5px;margin-top:3px;color:#718079;font-size:10px}.ticks{font-weight:900;letter-spacing:-2px;font-size:13px}.ticks.read{color:var(--blue)}.status-text{font-size:10px;color:#8a9690}
    .composer-wrap{position:sticky;bottom:0;z-index:10;flex:0 0 auto;background:#f5f7f6;border-top:1px solid var(--line)}.emoji-panel{display:none;position:absolute;bottom:72px;left:18px;width:min(360px,calc(100vw - 36px));background:white;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:12px;z-index:5}.emoji-panel.open{display:block}.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px}.emoji{border:0;background:transparent;font-size:23px;cursor:pointer;border-radius:7px;padding:4px}.emoji:hover{background:var(--soft)}
    .composer{padding:10px 14px;display:grid;grid-template-columns:auto 1fr auto;gap:9px;align-items:end}.composer textarea{width:100%;min-height:46px;max-height:150px;resize:none;border:1px solid var(--line);border-radius:14px;padding:12px 13px;outline:none;background:#fff}.composer textarea:focus{border-color:#9bcfc5}.send{min-width:96px;height:46px;border:0;border-radius:14px;background:var(--green);color:#fff;font-size:15px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;padding:0 18px;box-shadow:0 2px 7px rgba(18,140,126,.22)}.send:hover{background:var(--green-dark)}.send:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}.logout-btn{width:auto;min-width:78px;padding:0 12px;gap:6px;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center}.status-bar{padding:5px 16px 8px;color:var(--muted);font-size:11px;min-height:23px}.empty,.loading,.error{margin:auto;text-align:center;padding:30px;color:var(--muted)}.error{color:var(--danger)}.mobile-back{display:grid;place-items:center;width:38px;height:38px;border:1px solid var(--line);border-radius:50%;background:#fff;font-size:22px;line-height:1;cursor:pointer;color:var(--ink)}.mobile-back:hover{background:var(--soft)}.toast{position:fixed;right:18px;bottom:18px;background:#132f2a;color:white;padding:12px 16px;border-radius:12px;box-shadow:var(--shadow);opacity:0;transform:translateY(10px);pointer-events:none;transition:.2s;z-index:50}.toast.show{opacity:1;transform:none}.pulse{width:8px;height:8px;border-radius:50%;background:#29c98a;display:inline-block;margin-right:6px}
    .patient-title-row{display:flex;align-items:center;gap:8px}.edit-name-btn{border:1px solid var(--line);background:#fff;color:var(--green);border-radius:9px;padding:5px 8px;font-size:12px;font-weight:750;cursor:pointer;display:none}.edit-name-btn:hover{background:var(--soft)}.edit-name-btn.visible{display:inline-flex;align-items:center;gap:4px}
    .modal-backdrop{position:fixed;inset:0;background:rgba(11,35,31,.46);display:none;align-items:center;justify-content:center;padding:20px;z-index:100}.modal-backdrop.open{display:flex}.modal-card{width:min(430px,100%);background:#fff;border-radius:18px;box-shadow:0 24px 70px rgba(0,0,0,.25);padding:22px}.modal-card h3{margin:0 0 6px;font-size:20px}.modal-card p{margin:0 0 18px;color:var(--muted);font-size:13px;line-height:1.45}.modal-card label{display:block;font-size:13px;font-weight:750;margin-bottom:7px}.modal-card input{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px 13px;outline:none}.modal-card input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(11,122,109,.1)}.modal-actions{display:flex;justify-content:flex-end;gap:9px;margin-top:18px}.modal-actions button{border:1px solid var(--line);border-radius:11px;padding:10px 15px;font-weight:750;cursor:pointer;background:#fff}.modal-actions .save-name{background:var(--green);border-color:var(--green);color:#fff}.modal-actions button:disabled{opacity:.5;cursor:not-allowed}
    @media(max-width:780px){.app{grid-template-columns:1fr}.chat{display:none}.app.chat-open .sidebar{display:none}.app.chat-open .chat{display:flex}.mobile-back{display:grid}.messages{padding:18px 11px}.bubble{max-width:88%}.connection{display:none}}
  </style>
</head>
<body>
<main class="app" id="app">
  <aside class="sidebar">
    <div class="side-head">
      <div class="brand-row"><div class="brand"><div class="logo">&#129463;</div><div><h1>Dr Mina Inbox</h1><small id="inboxSummary">WhatsApp conversations</small></div></div><div class="head-actions"><button class="icon-btn" id="notifyButton" title="Enable notifications">&#128276;</button><form method="POST" action="/logout"><button class="icon-btn logout-btn" title="Log out" aria-label="Log out"><span aria-hidden="true">&#9211;</span><span>Log out</span></button></form></div></div>
      <div class="search-wrap"><input id="search" class="search" type="search" placeholder="Search name, phone or message"></div>
      <div class="filters"><button class="filter active" data-filter="all">All</button><button class="filter" data-filter="unread">Unread</button><button class="filter" data-filter="reviews">Reviews</button></div>
    </div>
    <div id="conversationList" class="conversation-list"><div class="loading">Loading conversationsâ€¦</div></div>
  </aside>
  <section class="chat">
    <header class="chat-header"><button id="backButton" class="mobile-back">â†</button><div class="avatar" id="chatAvatar">?</div><div><div class="patient-title-row"><h2 id="chatPhone">Select a conversation</h2><button id="editNameButton" class="edit-name-btn" type="button" title="Edit patient name">âœŽ Edit name</button></div><p id="chatSubtitle">Messages will appear here</p></div><div class="header-spacer"></div><div class="connection"><span class="pulse"></span>Live</div></header>
    <div id="messages" class="messages"><div class="empty"><div style="font-size:48px;margin-bottom:10px">&#128172;</div>Select a patient from the inbox.</div></div>
    <div class="composer-wrap"><div class="emoji-panel" id="emojiPanel"><div class="emoji-grid" id="emojiGrid"></div></div><form id="composer" class="composer"><button id="emojiButton" class="icon-btn" type="button" disabled>&#128522;</button><textarea id="replyText" placeholder="Type a message" disabled></textarea><button id="sendButton" class="send" type="submit" disabled><span>Send</span><span aria-hidden="true">&#10148;</span></button></form><div id="statusBar" class="status-bar">Secure inbox connected.</div></div>
  </section>
</main>
<div class="toast" id="toast"></div>
<div id="nameModal" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="nameModalTitle">
  <form id="nameForm" class="modal-card">
    <h3 id="nameModalTitle">Patient name</h3>
    <p id="nameModalPhone">Save a name for this WhatsApp number. It will appear in the inbox, search and notifications.</p>
    <label for="patientNameInput">Name</label>
    <input id="patientNameInput" maxlength="100" autocomplete="off" placeholder="Example: Ahmed Ali or Sara's mother" required>
    <div class="modal-actions"><button id="cancelNameButton" type="button">Cancel</button><button id="saveNameButton" class="save-name" type="submit">Save name</button></div>
  </form>
</div>
<script>
const state={messages:[],conversations:[],selectedPhone:null,filter:'all',initialLoad:true,lastIncomingIds:new Set()};
const $=id=>document.getElementById(id); const app=$('app'),list=$('conversationList'),msgBox=$('messages'),search=$('search'),chatPhone=$('chatPhone'),chatSubtitle=$('chatSubtitle'),chatAvatar=$('chatAvatar'),reply=$('replyText'),send=$('sendButton'),composer=$('composer'),statusBar=$('statusBar'),back=$('backButton'),emojiButton=$('emojiButton'),emojiPanel=$('emojiPanel'),emojiGrid=$('emojiGrid'),toast=$('toast'),editNameButton=$('editNameButton'),nameModal=$('nameModal'),nameForm=$('nameForm'),patientNameInput=$('patientNameInput'),nameModalPhone=$('nameModalPhone'),cancelNameButton=$('cancelNameButton'),saveNameButton=$('saveNameButton');
const emojis=['\u{1F600}','\u{1F601}','\u{1F602}','\u{1F923}','\u{1F60A}','\u{1F970}','\u{1F60D}','\u{1F618}','\u{1F642}','\u{1F609}','\u{1F607}','\u{1F917}','\u{1F914}','\u{1F622}','\u{1F62D}','\u{1F605}','\u{1F64F}','\u{1F44D}','\u{1F44F}','\u{1F44C}','\u2764\uFE0F','\u{1F499}','\u{1F49A}','\u{1F389}','\u2B50','\u2728','\u{1F9B7}','\u{1F476}','\u{1F467}','\u{1F466}','\u2705','\u{1F4C5}','\u{1F4AC}','\u{1F4DE}','\u{1F31F}','\u263A\uFE0F','\u{1F64C}','\u{1F490}','\u{1F90D}','\u{1F637}'];
emojiGrid.innerHTML=emojis.map(e=>`<button type="button" class="emoji">${e}</button>`).join('');
function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}
function repairText(v){const text=String(v??'');if(!/[ÃƒÃ‚Ã¢Ã°]/.test(text))return text;try{return decodeURIComponent(escape(text))}catch{return text}}
function dt(v){const d=new Date(v);return Number.isNaN(d)?null:d} function time(v){const d=dt(v);return d?new Intl.DateTimeFormat('en-GB',{timeZone:'Asia/Dubai',hour:'2-digit',minute:'2-digit'}).format(d):''}
function dayKey(v){const d=dt(v);return d?new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Dubai',year:'numeric',month:'2-digit',day:'2-digit'}).format(d):''}
function dayLabel(v){const d=dt(v);if(!d)return'';const now=new Date();const f=x=>new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Dubai',year:'numeric',month:'2-digit',day:'2-digit'}).format(x);const today=f(now),y=new Date(now-86400000);if(f(d)===today)return'TODAY';if(f(d)===f(y))return'YESTERDAY';return new Intl.DateTimeFormat('en-GB',{timeZone:'Asia/Dubai',weekday:'short',day:'2-digit',month:'short'}).format(d).toUpperCase()}
function initials(c){const n=(c.patientName||'').trim();if(n)return n.split(/\s+/).slice(0,2).map(x=>x[0]).join('').toUpperCase();return String(c.phone||'').replace(/\D/g,'').slice(-2)||'?'}
function build(messages){const m=new Map();messages.forEach(x=>{if(!x.phone)return;if(!m.has(x.phone))m.set(x.phone,{phone:x.phone,patientName:x.patient_name||'',messages:[],rating:null});const c=m.get(x.phone);c.messages.push(x);if(x.patient_name)c.patientName=x.patient_name;if(x.rating)c.rating=x.rating});return [...m.values()].map(c=>{c.messages.sort((a,b)=>new Date(a.created_timestamp)-new Date(b.created_timestamp));c.lastMessage=c.messages.at(-1);c.unreadCount=c.messages.filter(x=>x.direction==='incoming'&&x.is_read===false).length;return c}).sort((a,b)=>new Date(b.lastMessage.created_timestamp)-new Date(a.lastMessage.created_timestamp))}
function showToast(text){toast.textContent=text;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2500)}
function playDing(){try{const A=window.AudioContext||window.webkitAudioContext;const a=new A(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.setValueAtTime(880,a.currentTime);g.gain.setValueAtTime(.0001,a.currentTime);g.gain.exponentialRampToValueAtTime(.16,a.currentTime+.01);g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+.22);o.start();o.stop(a.currentTime+.23)}catch{}}
function browserNotify(c,m){if(Notification.permission==='granted'&&document.hidden)new Notification(repairText(c.patientName||c.phone),{body:repairText(m.message||'New WhatsApp message'),icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg"><text y=".9em" font-size="90">ðŸ¦·</text></svg>'})}
function detectNew(){const incoming=state.messages.filter(x=>x.direction==='incoming'&&x.whatsapp_message_id);const ids=new Set(incoming.map(x=>x.whatsapp_message_id));if(!state.initialLoad){incoming.filter(x=>!state.lastIncomingIds.has(x.whatsapp_message_id)).forEach(m=>{const c=state.conversations.find(c=>c.phone===m.phone);playDing();browserNotify(c||{phone:m.phone},m);showToast(`New message from ${(c&&c.patientName)||m.phone}`)})}state.lastIncomingIds=ids;state.initialLoad=false}
function updateTitle(){const n=state.conversations.reduce((s,c)=>s+c.unreadCount,0);document.title=n?`(${n}) Dr Mina Inbox`:'Dr Mina Inbox';$('inboxSummary').textContent=n?`${n} unread message${n===1?'':'s'}`:'All caught up'}
function visibleConversations(){const q=search.value.trim().toLowerCase();return state.conversations.filter(c=>{if(state.filter==='unread'&&!c.unreadCount)return false;if(state.filter==='reviews'&&!c.rating)return false;if(!q)return true;return [c.phone,c.patientName,...c.messages.map(x=>x.message||'')].join(' ').toLowerCase().includes(q)})}
function renderList(){const arr=visibleConversations();if(!arr.length){list.innerHTML='<div class="empty">No conversations found.</div>';return}list.innerHTML=arr.map(c=>{const last=c.lastMessage,name=repairText(c.patientName||c.phone),dir=last.direction==='outgoing'?'You: ':'';return `<button class="conversation-item ${state.selectedPhone===c.phone?'active':''} ${c.unreadCount?'unread':''}" data-phone="${esc(c.phone)}"><span class="avatar">${esc(initials(c))}</span><span class="conv-main"><span class="conv-top"><span class="name">${esc(name)}</span><span class="time">${esc(time(last.created_timestamp))}</span></span><span class="preview">${esc(repairText(dir+(last.message||'')))}</span><span class="conv-foot">${c.rating?`<span class="rating">â­ ${esc(c.rating)}/5</span>`:''}</span></span>${c.unreadCount?`<span class="unread-badge">${c.unreadCount}</span>`:`<span class="menu-btn" title="Mark unread">â‹®</span>`}</button>`}).join('');list.querySelectorAll('.conversation-item').forEach(b=>{b.onclick=e=>{if(e.target.classList.contains('menu-btn'))markRead(b.dataset.phone,false);else select(b.dataset.phone)}})}
async function markRead(phone,isRead=true){try{const r=await fetch('/api/inbox/read',{method:'POST',credentials:'same-origin',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone,isRead})});const j=await r.json();if(!r.ok||!j.success)throw new Error(j.error||'Could not update read status');state.messages.forEach(m=>{if(m.phone===phone&&m.direction==='incoming')m.is_read=isRead});if(!isRead){const incoming=state.messages.filter(m=>m.phone===phone&&m.direction==='incoming');if(incoming.length)incoming.at(-1).is_read=false}state.conversations=build(state.messages);renderList();updateTitle()}catch(e){showToast(e.message)}}
function select(phone){state.selectedPhone=phone;const c=state.conversations.find(x=>x.phone===phone);if(!c)return;chatPhone.textContent=repairText(c.patientName||c.phone);chatSubtitle.textContent=c.patientName?c.phone:`${c.messages.length} messages`;chatAvatar.textContent=initials(c);editNameButton.classList.add('visible');editNameButton.textContent=c.patientName?'âœŽ Edit name':'+ Add name';reply.disabled=send.disabled=emojiButton.disabled=false;renderMessages(c.messages);renderList();app.classList.add('chat-open');if(c.unreadCount)markRead(phone,true);reply.focus()}
function openNameModal(){const c=state.conversations.find(x=>x.phone===state.selectedPhone);if(!c)return;patientNameInput.value=repairText(c.patientName||'');nameModalPhone.textContent=`Save a name for ${c.phone}. It will appear in the inbox, search and notifications.`;nameModal.classList.add('open');setTimeout(()=>{patientNameInput.focus();patientNameInput.select()},0)}
function closeNameModal(){nameModal.classList.remove('open');saveNameButton.disabled=false;saveNameButton.textContent='Save name'}
async function savePatientName(e){e.preventDefault();const patientName=patientNameInput.value.trim();if(!state.selectedPhone||!patientName)return;saveNameButton.disabled=true;saveNameButton.textContent='Savingâ€¦';try{const r=await fetch('/api/inbox/patient-name',{method:'POST',credentials:'same-origin',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:state.selectedPhone,patientName})});const j=await r.json();if(!r.ok||!j.success)throw new Error(j.error||'Could not save patient name');state.messages.forEach(m=>{if(m.phone===state.selectedPhone)m.patient_name=j.patientName});state.conversations=build(state.messages);closeNameModal();select(state.selectedPhone);showToast('Patient name saved')}catch(e){showToast(e.message);saveNameButton.disabled=false;saveNameButton.textContent='Save name'}}
function ticks(status){const s=String(status||'').toLowerCase();if(s==='read')return'<span class="ticks read">&#10003;&#10003;</span>';if(s==='delivered')return'<span class="ticks">&#10003;&#10003;</span>';if(['sent','manual_inbox_reply','google_review_sent','feedback_acknowledged','awaiting_feedback'].includes(s))return'<span class="ticks">&#10003;</span>';if(s==='failed')return'<span style="color:#d92d20">!</span>';return''}
function renderMessages(messages){if(!messages.length){msgBox.innerHTML='<div class="empty">No messages.</div>';return}let html='',lastDay='',unreadShown=false;messages.forEach(m=>{const dk=dayKey(m.created_timestamp);if(dk!==lastDay){html+=`<div class="date-separator"><span>${dayLabel(m.created_timestamp)}</span></div>`;lastDay=dk}if(!unreadShown&&m.direction==='incoming'&&m.is_read===false){html+='<div class="unread-line">UNREAD MESSAGES</div>';unreadShown=true}const out=m.direction==='outgoing';html+=`<div class="message-row ${out?'outgoing':'incoming'}"><div class="bubble"><div>${esc(repairText(m.message||''))}</div><div class="message-meta"><span>${esc(time(m.created_timestamp))}</span>${out?ticks(m.status):''}</div></div></div>`});msgBox.innerHTML=html;msgBox.scrollTop=msgBox.scrollHeight}
async function load({keep=true}={}){try{statusBar.textContent='Syncingâ€¦';const r=await fetch('/api/inbox/messages',{credentials:'same-origin',cache:'no-store'});if(r.status===401){location='/login';return}const j=await r.json();if(!r.ok||!j.success)throw new Error(j.error||'Unable to load messages');state.messages=j.messages||[];state.conversations=build(state.messages);detectNew();renderList();updateTitle();if(keep&&state.selectedPhone){const c=state.conversations.find(x=>x.phone===state.selectedPhone);if(c){chatPhone.textContent=repairText(c.patientName||c.phone);chatSubtitle.textContent=c.patientName?c.phone:`${c.messages.length} messages`;chatAvatar.textContent=initials(c);editNameButton.classList.add('visible');editNameButton.textContent=c.patientName?'âœŽ Edit name':'+ Add name';renderMessages(c.messages)}}statusBar.textContent=`Updated ${time(new Date())}`}catch(e){statusBar.textContent=e.message;if(state.initialLoad)list.innerHTML=`<div class="error">${esc(e.message)}</div>`}}
composer.onsubmit=async e=>{e.preventDefault();const message=reply.value.trim();if(!state.selectedPhone||!message)return;send.disabled=reply.disabled=true;statusBar.textContent='Sendingâ€¦';try{const r=await fetch('/api/inbox/reply',{method:'POST',credentials:'same-origin',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:state.selectedPhone,message})});const j=await r.json();if(!r.ok||!j.success)throw new Error(j.error||'Not sent');reply.value='';showToast('Message sent');await load()}catch(e){showToast(e.message)}finally{reply.disabled=send.disabled=false;reply.focus()}};
reply.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();composer.requestSubmit()}};reply.oninput=()=>{reply.style.height='auto';reply.style.height=Math.min(reply.scrollHeight,150)+'px'};search.oninput=renderList;back.onclick=()=>{app.classList.remove('chat-open');state.selectedPhone=null;renderList();chatPhone.textContent='Select a conversation';chatSubtitle.textContent='Messages will appear here';chatAvatar.textContent='?';editNameButton.classList.remove('visible');reply.value='';reply.disabled=send.disabled=emojiButton.disabled=true;msgBox.innerHTML='<div class="empty"><div style="font-size:48px;margin-bottom:10px">&#128172;</div>Select a patient from the inbox.</div>';window.scrollTo(0,0)};emojiButton.onclick=()=>emojiPanel.classList.toggle('open');emojiGrid.onclick=e=>{if(e.target.classList.contains('emoji')){reply.value+=e.target.textContent;reply.focus()}};document.addEventListener('click',e=>{if(!emojiPanel.contains(e.target)&&e.target!==emojiButton)emojiPanel.classList.remove('open')});$('notifyButton').onclick=async()=>{if(!('Notification'in window)){showToast('Notifications not supported');return}const p=await Notification.requestPermission();showToast(p==='granted'?'Notifications enabled':'Notifications blocked')};document.querySelectorAll('.filter').forEach(b=>b.onclick=()=>{document.querySelectorAll('.filter').forEach(x=>x.classList.remove('active'));b.classList.add('active');state.filter=b.dataset.filter;renderList()});
editNameButton.onclick=openNameModal;nameForm.onsubmit=savePatientName;cancelNameButton.onclick=closeNameModal;nameModal.onclick=e=>{if(e.target===nameModal)closeNameModal()};document.addEventListener('keydown',e=>{if(e.key==='Escape'&&nameModal.classList.contains('open'))closeNameModal()});
load({keep:false});setInterval(()=>load(),5000);
</script>
